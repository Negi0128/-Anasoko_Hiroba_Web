<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anasoko Hiroba - プレイヤー切り替え</title>
<style>
  :root {
    color-scheme: light;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fdf6e3, #ffe0b2);
    font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
    padding: 16px;
    box-sizing: border-box;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    padding: 28px 24px;
    box-sizing: border-box;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 4px;
    color: #d84315;
  }
  .current {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .current strong {
    color: #d84315;
    font-size: 18px;
  }
  input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    font-size: 18px;
    padding: 14px 16px;
    border: 2px solid #eee;
    border-radius: 12px;
    outline: none;
    margin-bottom: 14px;
  }
  input[type="text"]:focus {
    border-color: #ff8a65;
  }
  button.submit {
    width: 100%;
    font-size: 18px;
    font-weight: bold;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #ff5722;
    color: #fff;
    cursor: pointer;
  }
  button.submit:active {
    background: #e64a19;
  }
  button.submit:disabled {
    background: #ccc;
  }
  .recent {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .recent button {
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #ffab91;
    background: #fff3e0;
    color: #bf360c;
    cursor: pointer;
  }
  .status {
    text-align: center;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .status.ok { color: #2e7d32; }
  .status.err { color: #c62828; }
</style>
</head>
<body>
  <div class="card">
    <h1>🥁 プレイヤー切り替え</h1>
    <div class="current">現在のプレイヤー: <strong id="currentName">読み込み中...</strong></div>

    <div class="recent" id="recentButtons"></div>

    <input type="text" id="nameInput" placeholder="プレイヤー名を入力" maxlength="30">
    <button class="submit" id="submitBtn">この名前に切り替える</button>
    <div class="status" id="status"></div>
  </div>

<script>
  const SUPABASE_URL = "https://ycrrinkhjphpnxdaxjcy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_lZcE91oagqwcz8A9SqZHSg_PBQ2j389";
  const RECENT_KEY = "anasoko_hiroba_recent_players";

  const currentNameEl = document.getElementById("currentName");
  const nameInput = document.getElementById("nameInput");
  const submitBtn = document.getElementById("submitBtn");
  const statusEl = document.getElementById("status");
  const recentButtonsEl = document.getElementById("recentButtons");

  function headers() {
    return {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
    };
  }

  function getRecent() {
    try {
      return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
    } catch (e) {
      return [];
    }
  }

  function addRecent(name) {
    let list = getRecent().filter(n => n !== name);
    list.unshift(name);
    list = list.slice(0, 6);
    localStorage.setItem(RECENT_KEY, JSON.stringify(list));
    renderRecent();
  }

  function renderRecent() {
    recentButtonsEl.innerHTML = "";
    getRecent().forEach(name => {
      const btn = document.createElement("button");
      btn.textContent = name;
      btn.onclick = () => {
        nameInput.value = name;
        updatePlayer(name);
      };
      recentButtonsEl.appendChild(btn);
    });
  }

  async function loadCurrent() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/app_settings?key=eq.current_player&select=value`,
        { headers: headers() }
      );
      const rows = await res.json();
      const value = rows.length > 0 ? rows[0].value : "";
      currentNameEl.textContent = value ? value : "（未設定）";
      nameInput.value = value || "";
    } catch (e) {
      currentNameEl.textContent = "取得失敗";
    }
  }

  async function updatePlayer(name) {
    if (!name) return;
    submitBtn.disabled = true;
    statusEl.textContent = "更新中...";
    statusEl.className = "status";
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/app_settings?key=eq.current_player`,
        {
          method: "PATCH",
          headers: headers(),
          body: JSON.stringify({ value: name }),
        }
      );
      if (!res.ok) throw new Error("HTTP " + res.status);
      currentNameEl.textContent = name;
      addRecent(name);
      statusEl.textContent = "✅ 切り替えました";
      statusEl.className = "status ok";
    } catch (e) {
      statusEl.textContent = "❌ 更新に失敗しました";
      statusEl.className = "status err";
    } finally {
      submitBtn.disabled = false;
    }
  }

  submitBtn.addEventListener("click", () => updatePlayer(nameInput.value.trim()));
  nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") updatePlayer(nameInput.value.trim());
  });

  renderRecent();
  loadCurrent();
</script>
</body>
</html>
